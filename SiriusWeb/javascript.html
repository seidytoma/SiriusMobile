}

// --- FUNÇÕES DE MODAL E FORMULÁRIO ---
function openFormModalForAdd() {
    const config = ENTITY_CONFIG[currentEntity];
    // ===== INÍCIO DA ALTERAÇÃO =====
    // Se a entidade tiver uma função de modal customizada, chame-a e pare a execução.
    if (config.customModalFunction && typeof window[config.customModalFunction] === 'function') {
        window[config.customModalFunction](); // Chama a função pelo nome (sem ID, pois é um novo registro)
        return;
    }
    // ===== FIM DA ALTERAÇÃO =====

    isFormReadyForSubmit = false;
    $('#mainForm')[0].reset();
    $('#formModalLabel').text(`Adicionar Novo ${config.label}`);
    generateFormFields({});
    formModal.show();
}

/**
 * Wrapper para abrir o modal de formulário genérico
 * @param {object} config - Configuração da entidade
 * @param {object} record - Dados do registro (null para novo)
 */
function openFormModal(config, record = null) {
    isFormReadyForSubmit = false;
    const isEdit = record && record[config.idField];
    
    $('#mainForm')[0].reset();
    $('#formModalLabel').text(isEdit ? `Editar ${config.label}` : `Adicionar Novo ${config.label}`);
    generateFormFields(record || {});
    formModal.show();
}

/**
 * VERSÃO CORRIGIDA V6 (Híbrida Segura)
 * Abre o modal de edição.
 * Mantém lógica legada para tabelas simples e usa lógica V7 para Equipamentos.
 */
function openFormModalForEdit(id) {
    const config = ENTITY_CONFIG[currentEntity];
    if (!config) return;

    // Bloqueia submit enquanto carrega
    isFormReadyForSubmit = false; 
    
    // Verifica se é Server-Side (Equipamentos, Aquisições, etc)
    const isServerSide = config.serverSide || config.customRenderer === 'initServerSideCrudView' || currentEntity === 'EQUIPAMENTOS';

    showLoader(true, "Carregando registro...");

    try {
        let record = null;

        // 1. Tenta buscar localmente se for Client-Side puro (pequenas listas)
        // Isso economiza uma ida ao servidor para tabelas pequenas
        if (!isServerSide) {
            const activeDataTable = $.fn.DataTable.isDataTable('#main-table') ? dataTable : null;
            if (activeDataTable) {
                record = activeDataTable.rows().data().toArray().find(r => String(r[config.idField]) == String(id));
            }
        }

        // 2. Se for Server-Side ou não achou localmente, busca no Backend
        if (isServerSide || !record) {
             
             // Define qual função do backend chamar
             let serverMethod = 'getRecordWithDetails'; // Padrão
             let serverParams = [config.sheetName || currentEntity, id, config.spreadsheetId]; // Parâmetros padrão
             
             // --- DESVIO ESPECÍFICO PARA EQUIPAMENTOS (V7) ---
             if (currentEntity === 'EQUIPAMENTOS') {
                 serverMethod = 'getEquipmentAndPlanDetailsForEdit'; // Função V7 blindada
                 serverParams = [id]; // Apenas o ID do equipamento
                 console.log(`[Edit] Usando rota especializada V7 para Equipamento ID: ${id}`);
             } else {
                 console.log(`[Edit] Usando rota padrão para ${currentEntity} ID: ${id}`);
             }
             
             // Chamada dinâmica ao Google Script
             google.script.run
                 .withSuccessHandler(response => {
                      showLoader(false);
                      
                      // Tratamento de Erro
                      if (response.error || (!response.parent && !response.data && currentEntity !== 'EQUIPAMENTOS')) {
                          showToast('Erro: Registro não encontrado.', 'danger');
                          return;
                      }

                      // Normaliza o objeto de dados (Padrão ou Equipamento)
                      // Equipamentos V7 retorna { success: true, parent: {...} }
                      // getRecordWithDetails padrão retorna { success: true, parent: {...}, children: ... }
                      const recordData = response.parent || response.data || response; 

                      // LOG DE DIAGNÓSTICO
                      if (currentEntity === 'EQUIPAMENTOS') {
                          console.log("[Edit] Dados do Equipamento recebidos:", recordData);
                          console.log("[Edit] Status do Plano:", recordData.prev_ativo);
                      }

                      $('#formModalLabel').text(`Editar ${config.label}`);
                      
                      // Gera o formulário
                      generateFormFields(recordData);
                      
                      // --- CORREÇÃO DE PREENCHIMENTO (TIMEOUT) ---
                      // Aplica apenas para Equipamentos para garantir que Select2 e condicionais carreguem
                      if (currentEntity === 'EQUIPAMENTOS') {
                          setTimeout(() => {
                              const form = $('#mainForm');
                              // Força valor do Select "Possui Plano?"
                              if (recordData.prev_ativo) {
                                  const selAtivo = form.find('#prev_ativo');
                                  if(selAtivo.length) selAtivo.val(recordData.prev_ativo).trigger('change');
                              }
                              // Recalcula residual se houver campos
                              if (typeof calculateValorResidual === 'function') calculateValorResidual();
                              
                              // Dispara togglePlanoFields para mostrar/esconder abas
                              if (typeof togglePlanoFields === 'function') {
                                  console.log("[Edit] Disparando togglePlanoFields forçado.");
                                  togglePlanoFields('#mainForm', 'PostLoad');
                              }
                          }, 300);
                      }
                      
                      formModal.show();
                 })
                 .withFailureHandler(err => {
                    isFormReadyForSubmit = true;
                    handleServerError(err);
                 })
                 [serverMethod](...serverParams); // Spread operator para passar argumentos dinâmicos
        } 
        else {
             // 3. Se achou localmente (Client-Side)
             $('#formModalLabel').text(`Editar ${config.label}`);
             generateFormFields(record);
             formModal.show();
             showLoader(false);
        }
    } catch(e) {
        isFormReadyForSubmit = true;
        showToast('ERRO CRÍTICO ao abrir edição: ' + e.message, 'danger');
        showLoader(false);
    }
}

function validateForm() {
    let isFormValid = true;
    const form = document.getElementById('mainForm');
    // Assegura que ENTITY_CONFIG[currentEntity] e formFieldsConfig existem antes de prosseguir
    if (!ENTITY_CONFIG[currentEntity] || !ENTITY_CONFIG[currentEntity].formFieldsConfig) {
        return true; // Se não há configuração de formulário, não há o que validar.
    }
    
    let groups = ENTITY_CONFIG[currentEntity].formFieldsConfig;

    if (groups.length > 0 && groups[0].name) {
        groups = [{
            fields: groups 
        }];
    }

    groups.forEach(group => {
        group.fields.forEach(fieldConfig => {
            if (fieldConfig.validationRules && fieldConfig.validationRules.required) {
                const inputElement = form.querySelector(`[name="${fieldConfig.name}"]`);
                if (inputElement) { 
                    const errorElement = inputElement.nextElementSibling;
                    
                    inputElement.classList.remove('is-invalid');
                    if(errorElement && errorElement.classList.contains('invalid-feedback')) {
                       errorElement.textContent = '';
                    }

                    // Validação inteligente: só verifica o campo se ele estiver VISÍVEL
                    if ($(inputElement).is(':visible') && (!inputElement.value || inputElement.value.trim() === '')) {
                        isFormValid = false;
                        inputElement.classList.add('is-invalid');
                        if(errorElement && errorElement.classList.contains('invalid-feedback')) {
                            errorElement.textContent = 'Este campo é obrigatório.';
                        }
                    }
                }
            }
        });
    });

    return isFormValid;
}

function handleFormSubmit(e) {
    e.preventDefault();

    if (!isFormReadyForSubmit) {
        console.warn("Submissão bloqueada: inicialização do modal em progresso.");
        return;
    }
    if (!validateForm()) {
        showToast('Por favor, corrija os erros no formulário.', 'danger');
        return;
    }
    
    const submitButton = $(this).find('button[type="submit"]');
    const originalText = submitButton.html();
    
    submitButton.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Salvando...');
    showLoader(true, "Salvando dados..."); 

    const config = ENTITY_CONFIG[currentEntity];
    const sheetName = config.sheetName || currentEntity;
    const formData = new FormData(e.target);
    const recordObject = Object.fromEntries(formData.entries());

    let formConfigGroups = config.formFieldsConfig || [];
    if (formConfigGroups.length > 0 && formConfigGroups[0].name) {
        formConfigGroups = [{ fields: formConfigGroups }];
    }
    formConfigGroups.forEach(group => {
        group.fields.forEach(field => {
            if (field.mask === 'money' && recordObject[field.name]) {
                const valorComMascara = $(`#${field.name}`).val() || '0';
                const valorSemPontos = valorComMascara.replace(/\./g, '');
                const valorComPontoDecimal = valorSemPontos.replace(',', '.');
                recordObject[field.name] = parseFloat(valorComPontoDecimal);
            }
        });
    });

    // === LÓGICA ESPECÍFICA PARA EQUIPAMENTOS (Versionamento e Imagem) ===
    if (currentEntity === 'EQUIPAMENTOS') {
        const equipObject = {};
        const planoObject = {};
        
        Object.keys(recordObject).forEach(key => {
            if (key.startsWith('prev_')) {
                planoObject[key] = recordObject[key];
            } else if (key !== 'planopreventivo_id' && key !== 'equipamento_imagem_file') {
                equipObject[key] = recordObject[key];
            }
        });

        const processSave = (fileData) => {
            if (fileData) {
                equipObject.imagem_upload = fileData; // Envia pro backend
            }
            
            google.script.run
                .withSuccessHandler(res => {
                    submitButton.prop('disabled', false).html(originalText);
                    if (res.success) {
                        showToast(res.message, 'success');
                        formModal.hide();
                        
                        try {
                            if ($.fn.DataTable.isDataTable('#equipamentos-main-table-cad')) {
                                $('#equipamentos-main-table-cad').DataTable().ajax.reload(null, false);
                            } else if ($.fn.DataTable.isDataTable('#equipamentos-main-table')) {
                                $('#equipamentos-main-table').DataTable().ajax.reload(null, false);
                            }
                        } catch(errTable) { }
                        
                    } else {
                        showToast('Erro ao salvar: ' + res.error, 'danger');
                    }
                    showLoader(false);
                })
                .withFailureHandler(err => {
                    submitButton.prop('disabled', false).html(originalText);
                    handleServerError(err);
                    showLoader(false);
                })
                .saveEquipamentoWithPlan(equipObject, planoObject);
        };

        // Lógica de Leitura do Arquivo Físico
        const fileInput = document.getElementById('equipamento_imagem_file');
        if (fileInput && fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                processSave({
                    data: ev.target.result.split(',')[1],
                    mimeType: fileInput.files[0].type,
                    fileName: fileInput.files[0].name
                });
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            processSave(null);
        }
        return; 
    }

    // === LÓGICA PADRÃO PARA OUTRAS ENTIDADES ===
    const isEditing = !!recordObject[config.idField];
    const serverFunction = isEditing ? 'updateRecord' : 'addRecord';
    const args = [sheetName, recordObject, config.spreadsheetId, config.idField];

    executeBackendWithRetry(
        serverFunction, 
        args,            
        (response) => { 
            submitButton.prop('disabled', false).html(originalText);
            if (response.success) {
                formModal.hide();
                showToast('Registro salvo com sucesso!', 'success');
                recordIdToHighlight = response.newId || response.updatedId;

                if (currentEntity === 'OTICAS_INVENTORY') {
                    if (typeof initOticasModule === 'function') initOticasModule('nav-oticas-inv-tab');
                    showLoader(false);
                    return;
                }

                // OTIMIZAÇÃO: Como todas as tabelas agora suportam AJAX nativo, recarregamos em segundo plano.
                if (dataTable && typeof dataTable.ajax === 'object' && dataTable.ajax.reload) {
                    dataTable.ajax.reload(null, false);
                } else if (config.customRenderer && typeof window[config.customRenderer] === 'function') {
                    window[config.customRenderer]();
                } else {
                    loadDataTable();
                }
            } else {
                showToast('Erro ao salvar: ' + (response.error || 'Erro desconhecido.'), 'danger');
                isFormReadyForSubmit = true;
            }
            showLoader(false);
        },
        (err) => { 
            isFormReadyForSubmit = true;
            handleServerError(err);
            submitButton.prop('disabled', false).html(originalText);
            showLoader(false);
        }
    );
}

function toggleStatus(id, isActive) {
    const newStatus = isActive ? 'Inativo' : 'Ativo';
    let baseMessage = `Tem certeza que deseja mudar o status deste item para "${newStatus}"?`;
    const config = ENTITY_CONFIG[currentEntity];
    const sheetName = config.sheetName || currentEntity;
    if (isActive) {
        showLoader(true);
        google.script.run
            .withSuccessHandler(response => {
                showLoader(false);
                if (response.error) {
                    showToast('Erro ao verificar dependências: ' + response.error, 'danger');
                    return;
                }
                let finalMessage = baseMessage;
                if (response.hasDependencies) {
                    finalMessage += `\n\n⚠️ ATENÇÃO: ${response.message}`;
                }
                showConfirm(finalMessage, function() {
                    executeUpdateStatus(id, newStatus);
                });
            })
            .withFailureHandler(err => {
                showLoader(false);
                showToast('Erro de comunicação ao verificar dependências: ' + err.message, 'danger');
            })
            .checkDependencies(sheetName, id);
    } else {
        showConfirm(baseMessage, function() {
            executeUpdateStatus(id, newStatus);
        });
    }
}

function executeUpdateStatus(id, newStatus) {
    showLoader(true);
    const config = ENTITY_CONFIG[currentEntity];
    const sheetName = config.sheetName || currentEntity;
    google.script.run
        .withSuccessHandler(response => {
            if (response.success) {
                loadDataTable(); 
                showToast('Status alterado com sucesso!', 'success');
            } else {
                showToast('Erro ao atualizar status: ' + (response.error || 'Erro desconhecido.'), 'danger');
                showLoader(false); 
            }
        })
        .withFailureHandler(err => {
            showToast('Erro de comunicação com o servidor: ' + err.message, 'danger');
            showLoader(false);
        })
        .updateRecordStatus(sheetName, id, newStatus, config.spreadsheetId);
}


/**
 * [V3 - SEGURA] Gera o HTML dinâmico para o modal de detalhes.
 * CORREÇÃO GAP 7: Implementada sanitização de HTML (escapeHtml) em todos os valores.
 */
function generateDetailsView(data) {
    console.log("--- DEBUG DETALHES ---");
    // console.log("Dados Recebidos:", data); // Comentei para limpar o console

    if (!data || !data.parent) {
        $('#detailsModalBody').html('<div class="alert alert-warning">Nenhum dado retornado pelo servidor.</div>');
        return;
    }

    const config = ENTITY_CONFIG[currentEntity];
    const record = data.parent;
    
    if (Object.keys(record).length === 0) {
         $('#detailsModalBody').html('<div class="alert alert-danger">O registro veio vazio do banco de dados.</div>');
         return;
    }

    let html = '<div class="container-fluid">';

    // --- 1. Card de Dados Principais ---
    html += '<div class="card mb-3"><div class="card-header fw-bold bg-light">Dados do Registro</div><div class="card-body"><div class="row">';

    // Mapeia Labels
    const fieldMap = {};
    if (config.formFieldsConfig) {
        config.formFieldsConfig.forEach(group => {
            const fields = group.fields ? group.fields : (Array.isArray(group) ? group : [group]); 
            fields.forEach(f => { if(f.name) fieldMap[f.name] = f.label; });
        });
    }
    if (config.columns) {
        config.columns.forEach(c => { if(c.data && c.title) fieldMap[c.data] = c.title; });
    }

    let camposExibidos = 0;

    for (const [key, value] of Object.entries(record)) {
        if (key === 'search_vector' || key === 'rowIndex') continue;
        
        // Oculta IDs técnicos se houver nome correspondente
        if (key.endsWith('_id') && key !== config.idField && !fieldMap[key]) {
             const baseName = key.replace('_id', '');
             if (record[baseName + '_nome'] || record[baseName + '_descricao']) continue;
        }

        camposExibidos++;
        const label = fieldMap[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        
        let displayValue = value;

        // Tratamento de valores
        if (displayValue === null || displayValue === undefined || displayValue === '') {
            displayValue = '<span class="text-muted fst-italic">Vazio</span>'; // HTML seguro fixo
        } 
        else if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}/.test(value)) {
           try { displayValue = new Date(value).toLocaleDateString('pt-BR'); } catch(e){ displayValue = escapeHtml(value); }
        }
        else {
            // --- AQUI ESTÁ A PROTEÇÃO ---
            // Se não for um valor vazio ou data formatada, escapamos o HTML
            displayValue = escapeHtml(value);
        }

        html += `
            <div class="col-md-6 mb-3 border-bottom pb-2">
                <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">${escapeHtml(label)}</small>
                <span class="text-dark" style="font-size: 0.95rem;">${displayValue}</span>
            </div>`;
    }
    
    if (camposExibidos === 0) {
        html += '<div class="col-12 text-muted">Nenhum campo visível para exibir.</div>';
    }

    html += '</div></div></div>';

    // --- 2. Itens Relacionados ---
    if (data.children) {
        for (const [childName, items] of Object.entries(data.children)) {
            if (items && items.length > 0) {
                html += `<div class="card mb-3 border-info"><div class="card-header fw-bold text-info bg-light">${escapeHtml(childName)} Associados</div><ul class="list-group list-group-flush">`;
                items.forEach(item => {
                    const desc = item.description || item.descricao || item.nome || Object.values(item)[1] || 'Item';
                    // Sanitiza a descrição do filho também
                    html += `<li class="list-group-item">${escapeHtml(desc)} <small class="text-muted">(ID: ${escapeHtml(item.id)})</small></li>`;
                });
                html += '</ul></div>';
            }
        }
    }

    // --- 3. Histórico ---
    if (data.history && data.history.length > 0) {
         html += `<div class="card mb-3 border-warning"><div class="card-header fw-bold text-warning bg-light">Histórico Recente</div><div class="table-responsive"><table class="table table-sm table-hover mb-0"><thead><tr><th>Data</th><th>Tipo</th><th>Ocorrência</th><th>Status</th></tr></thead><tbody>`;
         data.history.forEach(h => {
             html += `<tr>
                <td>${h.date ? new Date(h.date).toLocaleDateString('pt-BR') : '-'}</td>
                <td>${escapeHtml(h.type || '-')}</td>
                <td>${escapeHtml(h.description || '-')}</td>
                <td><span class="badge bg-secondary">${escapeHtml(h.status || '-')}</span></td>
             </tr>`;
         });
         html += `</tbody></table></div></div>`;
    }

    html += '</div>';
    $('#detailsModalBody').html(html);
}

function openDetailsModal(id) {
    showLoader(true);
    const config = ENTITY_CONFIG[currentEntity];
    google.script.run
        .withSuccessHandler(response => {
            showLoader(false);
            if (response.error) {
                showToast('Erro ao buscar detalhes: ' + response.error, 'danger');
                return;
            }
            
            // VERIFICA SE EXISTE UM RENDERIZADOR CUSTOMIZADO DE DETALHES
            if (config.customDetailsFunction && typeof window[config.customDetailsFunction] === 'function') {
                window[config.customDetailsFunction](response);
            } else {
                generateDetailsView(response); // Fallback padrão
            }
            
            detailsModal.show();
        })
        .withFailureHandler(err => {
            handleServerError(err);
        })
        .getRecordWithDetails(config.sheetName || currentEntity, id, config.spreadsheetId);
}

// --- FUNÇÕES DO MODAL DE INPUT (PROMPT) ---

let inputPromptCallback = null; // Armazena o callback

/**
 * Exibe um modal de prompt (Input) com correção de Z-Index para Modais Aninhados.
 * Move o elemento para o final do body para garantir sobreposição visual.
 */
function showInputPrompt(title, message, inputLabel, callback, inputType = 'text') {
    // 1. Configura os Textos e Inputs
    $('#inputPromptModalLabel').text(title);
    $('#inputPromptModalMessage').html(message.replace(/\n/g, '<br>'));
    $('#inputPromptModalInputLabel').text(inputLabel);
    
    const textInput = $('#inputPromptModalInput');
    const numContainer = $('#inputPromptModalNumberContainer');
    const numInput = $('#inputPromptModalNumber');

    textInput.val('');
    numInput.val('');
    
    $('#formInputPrompt').data('inputType', inputType);

    if (inputType === 'number') {
        textInput.hide().prop('required', false);
        numContainer.show();
        numInput.prop('required', true);
    } else {
        numContainer.hide().prop('required', false);
        textInput.show().prop('required', true);
    }
    
    inputPromptCallback = callback;
    
    const modalEl = $('#inputPromptModal');

    // --- CORREÇÃO DEFINITIVA DE MODAL ANINHADO ---

    // 1. Move fisicamente o modal para o final do body. 
    // Isso garante que ele esteja "por último" na ordem de pintura do navegador.
    modalEl.appendTo('body');

    // 2. Aplica classe de Z-Index altíssimo no próprio modal
    modalEl.addClass('z-index-top-modal');

    // 3. Inicializa e Mostra
    const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl[0]);
    modalInstance.show();

    // 4. Ajusta o Backdrop (Fundo escuro)
    // O Bootstrap cria o backdrop logo após o método .show().
    // Precisamos encontrar o *último* backdrop criado e aplicar o z-index nele.
    setTimeout(() => {
        // Pega todos os backdrops visíveis
        const backdrops = $('.modal-backdrop');
        
        if (backdrops.length > 1) {
            // Se houver mais de um (o do modal pai + o novo), pega o último
            const lastBackdrop = backdrops.last();
            lastBackdrop.addClass('z-index-top-backdrop');
            lastBackdrop.css('opacity', '0.5'); // Garante visual
        } else if (backdrops.length === 1) {
             // Caso raro onde o pai perdeu o backdrop, aplica neste
             backdrops.addClass('z-index-top-backdrop');
        }

        // Foco no input correto
        if (inputType === 'number') numInput.focus();
        else textInput.focus();
        
    }, 150); // Delay curto para garantir que o Bootstrap inseriu o backdrop no DOM
}

/**
 * Handler para o submit do prompt.
 * ATUALIZADO: Pega o valor do campo correto (texto ou número).
 */
function handleInputPromptSubmit(e) {
    e.preventDefault();
    
    const type = $('#formInputPrompt').data('inputType');
    let inputValue;

    if (type === 'number') {
        inputValue = $('#inputPromptModalNumber').val();
    } else {
        inputValue = $('#inputPromptModalInput').val().trim();
    }
    
    if (inputValue !== '' && inputValue !== null) {
        if (typeof inputPromptCallback === 'function') {
            inputPromptCallback(inputValue);
        }
        inputPromptModal.hide();
        inputPromptCallback = null;
    } else {
        showToast("Por favor, preencha o campo.", "danger");
    }
}
